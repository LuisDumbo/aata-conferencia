name: Laravel CI/CD

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências JS
        run: npm ci

      - name: Build frontend com Vite
        run: npm run build

      - name: Enviar arquivos para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          source: "."
          target: "/mnt/home8/aataao/ifatseaarm26.aata.ao"
          rm: false

      - name: Executar comandos Laravel via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e

            # Detectar automaticamente o PHP disponível no servidor
            if command -v /usr/local/bin/php &> /dev/null; then
              PHP="/usr/local/bin/php"
            elif command -v /opt/cpanel/ea-php82/root/usr/bin/php &> /dev/null; then
              PHP="/opt/cpanel/ea-php82/root/usr/bin/php"
            elif command -v /opt/cpanel/ea-php81/root/usr/bin/php &> /dev/null; then
              PHP="/opt/cpanel/ea-php81/root/usr/bin/php"
            elif command -v php &> /dev/null; then
              PHP="php"
            else
              echo "ERRO: Nenhum PHP encontrado no servidor!"
              exit 1
            fi

            echo "✅ PHP encontrado: $PHP"
            $PHP -v

            cd /mnt/home8/aataao/ifatseaarm26.aata.ao

            # Garantir que o .env existe
            if [ ! -f .env ]; then
              echo "ERRO: ficheiro .env não encontrado!"
              exit 1
            fi

            $PHP -r "require 'vendor/autoload.php';" 2>/dev/null || {
              echo "ERRO: vendor/autoload.php não encontrado. Corre composer install no servidor primeiro."
              exit 1
            }

            $PHP $(which composer || echo "/usr/local/bin/composer") dump-autoload --optimize --no-scripts

            $PHP artisan config:clear
            $PHP artisan config:cache
            $PHP artisan route:clear
            $PHP artisan route:cache
            $PHP artisan view:clear
            $PHP artisan view:cache

            echo "🚀 Deploy concluído com sucesso!"
