name: Laravel CI/CD

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências JS
        run: npm ci

      - name: Build frontend com Vite
        run: npm run build

      - name: Instalar dependências PHP (Composer)
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Enviar arquivos para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          source: "."
          target: "/mnt/home8/aataao/ifatseaarm26.aata.ao"
          rm: false

      - name: Executar comandos Laravel via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e

            PHP="/usr/local/bin/php"
            COMPOSER="/usr/local/bin/composer"
            APP_DIR="/mnt/home8/aataao/ifatseaarm26.aata.ao"

            echo "✅ PHP: $($PHP -v | head -1)"
            echo "✅ Composer: $COMPOSER"

            cd $APP_DIR
            echo "📁 Diretório: $(pwd)"

            # Verificar .env
            if [ ! -f .env ]; then
              echo "❌ ERRO: .env não encontrado! Cria o ficheiro .env no servidor."
              exit 1
            fi
            echo "✅ .env encontrado"

            # Verificar vendor
            if [ ! -f vendor/autoload.php ]; then
              echo "❌ ERRO: vendor/ não encontrado!"
              exit 1
            fi
            echo "✅ vendor/ encontrado"

            $PHP $COMPOSER dump-autoload --optimize --no-scripts

            $PHP artisan config:clear
            $PHP artisan config:cache
            $PHP artisan route:clear
            $PHP artisan route:cache
            $PHP artisan view:clear
            $PHP artisan view:cache

            echo "🚀 Deploy concluído com sucesso!"
