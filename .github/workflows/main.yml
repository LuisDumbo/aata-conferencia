name: Deploy Laravel via FTP

on:
  push:
    branches:
      - main   # troque para master se for o seu caso

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      # Opcional: se você tem frontend (Vite), descomente este bloco
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      #     cache: "npm"
      # - name: Build assets
      #   run: |
      #     npm ci
      #     npm run build

      # Cria caches do Laravel no runner (não precisa de servidor)
      - name: Laravel optimize (no server required)
        run: |
          cp .env.example .env
          php artisan key:generate --force
          php artisan config:cache
          php artisan route:cache || true
          php artisan view:cache || true

      - name: FTP Deploy (sync only changes)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: /ifatseaarm26.aata.ao/  # ajuste para o diretório correto no seu host
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.*
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**