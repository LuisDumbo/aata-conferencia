name: Laravel CI/CD

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências JS
        run: npm ci

      - name: Build frontend com Vite
        run: npm run build

      - name: Enviar arquivos para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          source: "."
          target: "/mnt/home8/aataao/ifatseaarm26.aata.ao"
          rm: false

      - name: Executar comandos Laravel via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          script_stop: true
          script: |
            set -e

            PHP="/usr/local/bin/php"

            echo "✅ PHP: $($PHP -v | head -1)"

            # Localizar o composer
            if command -v /usr/local/bin/composer &> /dev/null; then
              COMPOSER="/usr/local/bin/composer"
            elif command -v composer &> /dev/null; then
              COMPOSER="composer"
            elif [ -f "/usr/local/bin/composer.phar" ]; then
              COMPOSER="$PHP /usr/local/bin/composer.phar"
            elif [ -f "$HOME/bin/composer" ]; then
              COMPOSER="$HOME/bin/composer"
            else
              echo "ERRO: Composer não encontrado!"
              exit 1
            fi

            echo "✅ Composer: $COMPOSER"

            cd /mnt/home8/aataao/ifatseaarm26.aata.ao

            echo "📁 Diretório: $(pwd)"
            echo "📋 Ficheiros: $(ls -la | head -20)"

            # Verificar .env
            if [ ! -f .env ]; then
              echo "⚠️  AVISO: .env não encontrado!"
            else
              echo "✅ .env encontrado"
            fi

            # Verificar vendor
            if [ ! -f vendor/autoload.php ]; then
              echo "⚠️  vendor/ não encontrado. A correr composer install..."
              $PHP $COMPOSER install --no-dev --optimize-autoloader --no-interaction
            else
              echo "✅ vendor/ encontrado"
              $PHP $COMPOSER dump-autoload --optimize --no-scripts
            fi

            $PHP artisan config:clear
            $PHP artisan config:cache
            $PHP artisan route:clear
            $PHP artisan route:cache
            $PHP artisan view:clear
            $PHP artisan view:cache

            echo "🚀 Deploy concluído com sucesso!"
