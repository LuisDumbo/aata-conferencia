name: Publish Website to cPanel (Laravel) via SFTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node + Vite
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Build assets (Vite)
        run: npm run build

      # PHP + Composer (gera vendor/)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Composer deps (vendor)
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      # Enviar via SFTP
      - name: Upload to cPanel via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          source: "."
          target: ${{ secrets.SFTP_TARGET }}
          overwrite: true
