name: Deploy Laravel via FTP (robust)

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Deploy to FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          protocol: ftps
          port: 21

          timeout: 300000

          # use uma pasta que JA EXISTE (crie manualmente no servidor)
          server-dir: /ifatseaarm26.aata.ao/

          exclude: |
            .git/**
            **/.git/**
            **/.git*
            .github/**
            **/.github/**
            vendor/**
            **/vendor/**
            node_modules/**
            **/node_modules/**
            tests/**
            **/tests/**
            .env
            .env.*
            **/.env
            **/.env.*
            storage/logs/**
            **/storage/logs/**
            storage/framework/cache/**
            storage/framework/sessions/**
            storage/framework/views/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**