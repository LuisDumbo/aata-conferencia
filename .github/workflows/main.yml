name: Deploy Laravel via FTP (stable)

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Network check to FTP
        run: |
          getent hosts "${{ secrets.FTP_SERVER }}" || true
          timeout 10 bash -c 'cat < /dev/null > /dev/tcp/${{ secrets.FTP_SERVER }}/21' \
            && echo "Port 21 OK" || (echo "Port 21 FAIL" && exit 1)

      - name: Deploy to FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          protocol: ftps
          port: 21

          # dá folga pra servidores lentos
          timeout: 300000

          # ajuste este caminho conforme o seu hosting
          server-dir: /ifatseaarm26.aata.ao/

          exclude: |
            **/.git*
            **/.github/**
            **/vendor/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.*
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**