name: Publish Website to cPanel (Laravel)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        run: npm ci

      - name: Build assets (Vite)
        run: npm run build

      # Se você NÃO usa SSH/Composer no servidor, você PRECISA gerar o vendor aqui
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Install Composer deps (vendor)
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          protocol: ftp
          port: 21
          timeout: 600000
          log-level: verbose

          local-dir: ./
          server-dir: /ifatseaarm26.aata.ao/

          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**/*
            **/.vscode/**/*
            **/node_modules/**/*
            **/tests/**/*
            **/.env
            **/.env.*
            storage/logs/**/*
            storage/framework/cache/**/*
            storage/framework/sessions/**/*
            storage/framework/views/**/*
            **/*.log
            README.md
            LICENSE.txt
